name: Ingesta de eventos (worker)

# Procesa la cola `ingestion_jobs`: descarga eventos de Opta, los adelgaza,
# comprime y sube a Supabase Storage. Corre por cron y bajo demanda.
on:
  schedule:
    # Cada 15 minutos. Ajusta la frecuencia según necesites.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

# Evita solapes si un run tarda más que el intervalo del cron.
concurrency:
  group: ingestion-worker
  cancel-in-progress: false

jobs:
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SDAPI_OUTLET_KEY: ${{ secrets.SDAPI_OUTLET_KEY }}
        run: python worker.py
